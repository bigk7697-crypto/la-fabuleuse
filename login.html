<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Admin - LA FABULEUSE</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon-modern.svg" />
    <link rel="apple-touch-icon" href="/logo-la-fabuleuse-modern.svg" />
    <link rel="shortcut icon" href="/favicon-modern.svg" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Custom Styles -->
    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      
      @keyframes glow {
        0%, 100% { 
          box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        50% { 
          box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }
      }
      
      /* Premium styles */
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out;
      }
      
      .animate-shimmer {
        animation: shimmer 3s infinite linear;
        background-size: 200% 100%;
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.2) 20%,
          rgba(255, 255, 255, 0) 40%,
          rgba(255, 255, 255, 0.2) 60%,
          rgba(255, 255, 255, 0) 80%,
          rgba(255, 255, 255, 0) 100%
        );
      }
      
      .animate-glow {
        animation: glow 2s ease-in-out infinite alternate;
      }
      
      .card-premium {
        background: linear-gradient(145deg, #1a1a1a 0%, #141414 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem;
        border-radius: 1.5rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      
      .card-premium:hover {
        border-color: rgba(212, 175, 55, 0.3);
        transform: translateY(-0.25rem);
      }
      
      .btn-premium {
        background: #d4af37;
        color: #000000;
        font-weight: 700;
        padding: 1rem 1.5rem;
        border-radius: 0.75rem;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        position: relative;
        overflow: hidden;
      }
      
      .btn-premium:hover {
        background: #b8962e;
        transform: translateY(-0.125rem);
      }
      
      .btn-premium::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        animation: shimmer 2s infinite;
      }
      
      .btn-premium span {
        position: relative;
        z-index: 1;
      }
      
      .input-premium {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        padding: 1rem 1rem;
        color: #ffffff;
        transition: all 0.3s ease;
        outline: none;
      }
      
      .input-premium:focus {
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
      }
      
      .input-premium::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      
      .text-gradient {
        background: linear-gradient(90deg, #d4af37 0%, #f4e4c1 50%, #d4af37 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      /* Loading spinner */
      .spinner {
        border: 3px solid rgba(212, 175, 55, 0.1);
        border-top: 3px solid #d4af37;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Responsive */
      @media (max-width: 640px) {
        .card-premium {
          padding: 1.5rem;
          margin: 1rem;
        }
        
        .btn-premium {
          padding: 0.875rem 1.25rem;
          font-size: 0.875rem;
        }
        
        .input-premium {
          padding: 0.875rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0a0a0a] via-[#1a1a1a] to-[#0a0a0a] p-4">
      <!-- Background decoration -->
      <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-20 w-72 h-72 bg-[#d4af37] rounded-full filter blur-3xl opacity-20"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-[#d4af37] rounded-full filter blur-3xl opacity-20"></div>
      </div>
      
      <!-- Back to site link -->
      <a href="/" class="absolute top-8 left-8 text-gray-400 hover:text-[#d4af37] flex items-center gap-2 transition-colors z-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Retour au site
      </a>
      
      <!-- Login Card -->
      <div class="card-premium w-full max-w-md animate-fade-in relative z-10">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-[#d4af37] rounded-2xl flex items-center justify-center mx-auto mb-4 animate-glow">
            <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
          </div>
          <h1 class="text-3xl font-bold text-gradient mb-2">Espace Admin</h1>
          <p class="text-gray-400">Connectez-vous pour gérer votre établissement</p>
        </div>
        
        <!-- Error Message -->
        <div id="errorMessage" class="hidden mb-6 p-4 bg-red-900/50 border border-red-700 rounded-xl text-red-300 text-sm">
          Erreur de connexion
        </div>
        
        <!-- Success Message -->
        <div id="successMessage" class="hidden mb-6 p-4 bg-green-900/50 border border-green-700 rounded-xl text-green-300 text-sm">
          Connexion réussie
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-400 uppercase tracking-widest">Email</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <input 
                type="email" 
                id="email"
                class="input-premium w-full pl-12"
                placeholder="admin@lafabuleuse.tg"
                required
              />
            </div>
          </div>
          
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-400 uppercase tracking-widest">Mot de passe</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
              <input 
                type="password" 
                id="password"
                class="input-premium w-full pl-12"
                placeholder="••••••••"
                required
              />
            </div>
          </div>
          
          <button
            type="submit"
            id="loginBtn"
            class="btn-premium w-full flex items-center justify-center gap-2 disabled:opacity-50"
          >
            <span id="loginBtnText">Se connecter</span>
            <div id="loginSpinner" class="spinner hidden"></div>
          </button>
        </form>
        
        <!-- Help Section -->
        <div class="mt-8 pt-6 border-t border-gray-800">
          <div class="text-center text-sm text-gray-400">
            <p class="mb-2">Besoin d'aide ?</p>
            <p>Contactez l'administrateur système</p>
            <p class="text-[#d4af37] mt-2">admin@lafabuleuse.tg</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Main JavaScript -->
    <script>
      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyDRkDvEANAlnR6mIy5873IW9JjWoC4G7Kk",
        authDomain: "la-fabuleuse-tg-669c0.firebaseapp.com",
        databaseURL: "https://la-fabuleuse-tg-669c0-default-rtdb.firebaseio.com",
        projectId: "la-fabuleuse-tg-669c0",
        storageBucket: "la-fabuleuse-tg-669c0.firebasestorage.app",
        messagingSenderId: "190970983644",
        appId: "1:190970983644:web:1999ec77d9d7f09063b019",
        measurementId: "G-WZD3RN807G"
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // DOM Elements
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginSpinner = document.getElementById('loginSpinner');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');

      // Initialize
      document.addEventListener('DOMContentLoaded', () => {
        // Pre-fill admin email
        emailInput.value = 'admin@lafabuleuse.tg';
        
        // Check if already logged in
        auth.onAuthStateChanged(user => {
          if (user) {
            // Already logged in, redirect to admin
            window.location.href = '/admin.html';
          }
        });
      });

      // Handle login
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
          showError('Veuillez remplir tous les champs');
          return;
        }
        
        // Show loading state
        setLoading(true);
        hideMessages();
        
        try {
          // Sign in with Firebase
          await auth.signInWithEmailAndPassword(email, password);
          
          // Show success
          showSuccess('Connexion réussie');
          
          // Redirect to admin panel
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 1000);
          
        } catch (error) {
          console.error('Login error:', error);
          
          // Handle specific errors
          let message = 'Erreur de connexion';
          
          switch (error.code) {
            case 'auth/user-not-found':
              message = 'Utilisateur non trouvé';
              break;
            case 'auth/wrong-password':
              message = 'Mot de passe incorrect';
              break;
            case 'auth/invalid-email':
              message = 'Email invalide';
              break;
            case 'auth/user-disabled':
              message = 'Compte désactivé';
              break;
            case 'auth/too-many-requests':
              message = 'Trop de tentatives, réessayez plus tard';
              break;
            case 'auth/network-request-failed':
              message = 'Erreur réseau, vérifiez votre connexion';
              break;
            default:
              message = 'Erreur: ' + error.message;
          }
          
          showError(message);
        } finally {
          setLoading(false);
        }
      });

      function setLoading(loading) {
        loginBtn.disabled = loading;
        if (loading) {
          loginBtnText.textContent = 'Connexion...';
          loginSpinner.classList.remove('hidden');
        } else {
          loginBtnText.textContent = 'Se connecter';
          loginSpinner.classList.add('hidden');
        }
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
        successMessage.classList.add('hidden');
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.classList.remove('hidden');
        errorMessage.classList.add('hidden');
      }

      function hideMessages() {
        errorMessage.classList.add('hidden');
        successMessage.classList.add('hidden');
      }
    </script>
  </body>
</html>
