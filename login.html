<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - LA FABULEUSE</title>
    
    <!-- Favicon correct -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon-new.svg">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: Inter, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 48px;
            max-width: 400px;
            width: 100%;
            margin: 20px;
        }
        .btn-login {
            background: #d4af37;
            color: black;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 16px;
        }
        .btn-login:hover {
            background: #b8941f;
            transform: translateY(-2px);
        }
        .form-input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
        }
        .form-input:focus {
            outline: none;
            border-color: #d4af37;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #d4af37;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-weight: bold;
            font-size: 24px;
            color: black;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">LF</div>
        
        <h1 class="text-2xl font-bold text-center mb-8">Connexion Admin</h1>
        
        <form onsubmit="login(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="admin@lafabuleuse.tg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Mot de passe</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-login">
                    Se connecter
                </button>
            </div>
        </form>
        
        <div id="error" class="mt-4 p-3 bg-red-600/20 border border-red-600 rounded-lg text-red-400 text-sm hidden"></div>
        
        <div class="mt-8 text-center text-gray-400 text-sm">
            <p>LA FABULEUSE - Panneau d'administration</p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDRkDvEANAlnR6mIy5873IW9JjWoC4G7Kk",
            authDomain: "la-fabuleuse-tg-669c0.firebaseapp.com",
            projectId: "la-fabuleuse-tg-669c0",
            storageBucket: "la-fabuleuse-tg-669c0.firebasestorage.app",
            messagingSenderId: "190970983644",
            appId: "1:190970983644:web:1999ec77d9d7f09063b019"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if already logged in
        auth.onAuthStateChanged(function(user) {
            if (user) {
                console.log('✅ Déjà connecté, redirection...');
                window.location.href = '/admin.html';
            }
        });

        async function login(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            console.log('🔐 Tentative de connexion:', email);
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Connexion réussie:', userCredential.user.email);
                
                // Redirection vers l'admin
                window.location.href = '/admin.html';
                
            } catch (error) {
                console.error('❌ Erreur de connexion:', error);
                
                let errorMessage = 'Erreur de connexion';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Utilisateur non trouvé';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Mot de passe incorrect';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Email invalide';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Trop de tentatives, réessayez plus tard';
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    errorDiv.classList.add('hidden');
                }, 5000);
            }
        }
    </script>
</body>
</html>
