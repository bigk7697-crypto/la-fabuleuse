<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connexion Admin - LA FABULEUSE</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon-new.svg">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; 
            color: white;
            overflow-x: hidden;
            touch-action: pan-y;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 48px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #d4af37;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #0a0a0a;
            margin: 0 auto 32px;
        }
        
        h1 {
            font-size: 2rem;
            margin: 0 0 32px;
            background: linear-gradient(135deg, #d4af37, #f4e4bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
        
        .error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #d4af37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                margin: 16px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">LF</div>
        <h1>Connexion Admin</h1>
        
        <form onsubmit="login(event)">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="admin@lafabuleuse.tg">
            </div>
            
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••••">
            </div>
            
            <div class="loading" id="loading"></div>
            <button type="submit" class="btn" id="submitBtn">Se connecter</button>
        </form>
        
        <div class="error" id="error"></div>
        
        <div style="margin-top: 32px; padding-top: 32px; border-top: 1px solid #333;">
            <p style="color: #999; font-size: 14px;">LA FABULEUSE</p>
            <p style="color: #666; font-size: 12px; margin-top: 8px;">Panneau d'administration</p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDRkDvEANAlnR6mIy5873IW9JjWoC4G7Kk",
            authDomain: "la-fabuleuse-tg-669c0.firebaseapp.com",
            projectId: "la-fabuleuse-tg-669c0",
            storageBucket: "la-fabuleuse-tg-669c0.firebasestorage.app",
            messagingSenderId: "190970983644",
            appId: "1:190970983644:web:1999ec77d9d7f09063b019"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if already logged in
        auth.onAuthStateChanged(function(user) {
            if (user) {
                window.location.href = '/admin-new.html';
            }
        });

        async function login(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            
            // Show loading
            loading.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';
            errorDiv.style.display = 'none';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Redirect will happen automatically via onAuthStateChanged
            } catch (error) {
                let errorMessage = 'Erreur de connexion';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Utilisateur non trouvé';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Mot de passe incorrect';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email invalide';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Trop de tentatives, réessayez plus tard';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
            } finally {
                // Hide loading
                loading.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        }
    </script>
</body>
</html>
